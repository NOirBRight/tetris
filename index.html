<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mobile Tetris</title>
<style>
  body { background: #202028; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; touch-action: none; }
  #score { font-size: 24px; margin-bottom: 10px; font-weight: bold; }
  canvas { background: #000; outline: 2px solid #555; max-width: 100%; height: auto; max-height: 55vh; display: block; }
  .controls { display: grid; grid-template-columns: 80px 80px 80px; grid-template-rows: 60px 60px 60px; gap: 10px; margin-top: 20px; }
  .btn { background: #444; border: 2px solid #666; color: white; border-radius: 8px; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
  .btn:active { background: #666; }
  #btn-rotate { grid-column: 2; grid-row: 1; }
  #btn-left { grid-column: 1; grid-row: 2; }
  #btn-drop { grid-column: 2; grid-row: 2; }
  #btn-right { grid-column: 3; grid-row: 2; }
  #btn-hard { grid-column: 2; grid-row: 3; background: #822; }
  #btn-hard:active { background: #a44; }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="tetris" width="240" height="400"></canvas>
<div class="controls">
  <div class="btn" id="btn-rotate">Rotate</div>
  <div class="btn" id="btn-left">Left</div>
  <div class="btn" id="btn-drop">Drop</div>
  <div class="btn" id="btn-right">Right</div>
  <div class="btn" id="btn-hard">Hard Drop</div>
</div>
<script>
  const canvas = document.getElementById('tetris');
  const context = canvas.getContext('2d');
  context.scale(20, 20);

  function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y > 0; --y) {
      for (let x = 0; x < arena[y].length; ++x) {
        if (arena[y][x] === 0) continue outer;
      }
      const row = arena.splice(y, 1)[0].fill(0);
      arena.unshift(row);
      ++y;
      player.score += rowCount * 10;
      rowCount *= 2;
    }
  }

  function collide(arena, player) {
    const m = player.matrix;
    const o = player.pos;
    for (let y = 0; y < m.length; ++y) {
      for (let x = 0; x < m[y].length; ++x) {
        if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
          return true;
        }
      }
    }
    return false;
  }

  function createMatrix(w, h) {
    const matrix = [];
    while (h--) matrix.push(new Array(w).fill(0));
    return matrix;
  }

  function createPiece(type) {
    if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
    if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
    if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
    if (type === 'O') return [[4, 4], [4, 4]];
    if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
    if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
    if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
  }

  function drawMatrix(matrix, offset) {
    const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
    matrix.forEach((row, y) => {
      row.forEach((value, x) => {
        if (value !== 0) {
          context.fillStyle = colors[value];
          context.fillRect(x + offset.x, y + offset.y, 1, 1);
        }
      });
    });
  }

  function draw() {
    context.fillStyle = '#000';
    context.fillRect(0, 0, canvas.width, canvas.height);
    drawMatrix(arena, {x: 0, y: 0});
    drawMatrix(player.matrix, player.pos);
  }

  function merge(arena, player) {
    player.matrix.forEach((row, y) => {
      row.forEach((value, x) => {
        if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
      });
    });
  }

  function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
      player.pos.y--;
      merge(arena, player);
      playerReset();
      arenaSweep();
      updateScore();
    }
    dropCounter = 0;
  }

  function playerHardDrop() {
    while (!collide(arena, player)) {
      player.pos.y++;
    }
    player.pos.y--;
    merge(arena, player);
    playerReset();
    arenaSweep();
    updateScore();
    dropCounter = 0;
  }

  function playerMove(offset) {
    player.pos.x += offset;
    if (collide(arena, player)) player.pos.x -= offset;
  }

  function playerReset() {
    currentPieceId++;
    const pieces = 'TJLOSZI';
    player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    if (collide(arena, player)) {
      arena.forEach(row => row.fill(0));
      player.score = 0;
      updateScore();
    }
  }

  function playerRotate(dir) {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
      player.pos.x += offset;
      offset = -(offset + (offset > 0 ? 1 : -1));
      if (offset > player.matrix[0].length) {
        rotate(player.matrix, -dir);
        player.pos.x = pos;
        return;
      }
    }
  }

  function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
      for (let x = 0; x < y; ++x) {
        [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
      }
    }
    if (dir > 0) matrix.forEach(row => row.reverse());
    else matrix.reverse();
  }

  let dropCounter = 0;
  let dropInterval = 1000;
  let lastTime = 0;
  let currentPieceId = 0;

  function update(time = 0) {
    const deltaTime = time - lastTime;
    lastTime = time;
    dropCounter += deltaTime;
    if (dropCounter > dropInterval) playerDrop();
    draw();
    requestAnimationFrame(update);
  }

  function updateScore() {
    document.getElementById('score').innerText = 'Score: ' + player.score;
  }

  let activeDropPieceId = -1;
  document.addEventListener('keydown', event => {
    if (event.keyCode === 37) playerMove(-1);
    else if (event.keyCode === 39) playerMove(1);
    else if (event.keyCode === 40) {
      if (!event.repeat) activeDropPieceId = currentPieceId;
      if (activeDropPieceId === currentPieceId) playerDrop();
    }
    else if (event.keyCode === 38) playerRotate(1);
    else if (event.keyCode === 32) playerHardDrop();
  });

  document.addEventListener('keyup', event => {
    if (event.keyCode === 40) activeDropPieceId = -1;
  });

  const addTouch = (id, action) => {
    const el = document.getElementById(id);
    const trigger = (e) => { if(e.cancelable) e.preventDefault(); action(); };
    el.addEventListener('mousedown', trigger);
    el.addEventListener('touchstart', trigger, { passive: false });
  };

  const addContinuousTouch = (id, action, onStop) => {
    const el = document.getElementById(id);
    let timeoutId, intervalId;
    
    const start = (e) => {
      if (e.cancelable) e.preventDefault();
      clearTimeout(timeoutId);
      clearInterval(intervalId);
      action();
      timeoutId = setTimeout(() => {
        intervalId = setInterval(action, 50);
      }, 200);
    };
    
    const stop = (e) => {
      if (e.cancelable) e.preventDefault();
      clearTimeout(timeoutId);
      clearInterval(intervalId);
      if (onStop) onStop();
    };
    
    el.addEventListener('mousedown', start);
    el.addEventListener('touchstart', start, { passive: false });
    el.addEventListener('mouseup', stop);
    el.addEventListener('mouseleave', stop);
    el.addEventListener('touchend', stop);
    el.addEventListener('touchcancel', stop);
  };
  
  addContinuousTouch('btn-left', () => playerMove(-1));
  addContinuousTouch('btn-right', () => playerMove(1));
  let touchDropPieceId = -1;
  addContinuousTouch('btn-drop', () => {
    if (touchDropPieceId === -1) touchDropPieceId = currentPieceId;
    if (touchDropPieceId === currentPieceId) playerDrop();
  }, () => {
    touchDropPieceId = -1;
  });
  addTouch('btn-rotate', () => playerRotate(1));
  addTouch('btn-hard', () => playerHardDrop());

  const arena = createMatrix(12, 20);
  const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

  playerReset();
  updateScore();
  update();
</script>
</body>
</html>
